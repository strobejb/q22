<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" shape-rendering="geometricPrecision" role="img" aria-labelledby="title desc">
  <title id="title">Mid-gray double folder box with face-color lid and darker front face</title>
  <desc id="desc">The mid-gray front lid uses the front-face palette, while the front-left face is darker and a subtle rear seam defines the lid.</desc>
  <defs>
    <linearGradient id="midgray-double-closed-top" gradientUnits="userSpaceOnUse" x1="8" y1="4" x2="55" y2="40">
      <stop offset="0%" stop-color="#FEFEFE"/><stop offset="34%" stop-color="#EFEFEF"/><stop offset="72%" stop-color="#D9D9D9"/><stop offset="100%" stop-color="#C3C3C3"/>
    </linearGradient>
    <linearGradient id="midgray-double-closed-left" gradientUnits="userSpaceOnUse" x1="7" y1="14" x2="38" y2="58">
      <stop offset="0%" stop-color="#D1D1D1"/><stop offset="58%" stop-color="#B4B4B4"/><stop offset="100%" stop-color="#969696"/>
    </linearGradient>
    <linearGradient id="midgray-double-closed-right" gradientUnits="userSpaceOnUse" x1="28" y1="18" x2="58" y2="59">
      <stop offset="0%" stop-color="#989898"/><stop offset="54%" stop-color="#747474"/><stop offset="100%" stop-color="#5A5A5A"/>
    </linearGradient>
    <linearGradient id="midgray-double-closed-rim-light" gradientUnits="userSpaceOnUse" x1="12" y1="7" x2="47" y2="34">
      <stop offset="0%" stop-color="#FEFEFE"/><stop offset="52%" stop-color="#EFEFEF"/><stop offset="100%" stop-color="#D9D9D9"/>
    </linearGradient>
    <linearGradient id="midgray-double-closed-rim-left" gradientUnits="userSpaceOnUse" x1="14" y1="18" x2="35" y2="35">
      <stop offset="0%" stop-color="#D1D1D1"/><stop offset="100%" stop-color="#B4B4B4"/>
    </linearGradient>
    <linearGradient id="midgray-double-closed-rim-right" gradientUnits="userSpaceOnUse" x1="31" y1="17" x2="50" y2="35">
      <stop offset="0%" stop-color="#989898"/><stop offset="100%" stop-color="#747474"/>
    </linearGradient>
      <linearGradient id="midgray-double-light-normalized-front-top" gradientUnits="userSpaceOnUse" x1="28" y1="19" x2="75" y2="55">
      <stop offset="0%" stop-color="#FEFEFE"/><stop offset="34%" stop-color="#EFEFEF"/><stop offset="72%" stop-color="#D9D9D9"/><stop offset="100%" stop-color="#C3C3C3"/>
    </linearGradient>
      <linearGradient id="midgray-double-normalized-front-left" gradientUnits="userSpaceOnUse" x1="27" y1="29" x2="58" y2="73">
      <stop offset="0%" stop-color="#D1D1D1"/><stop offset="58%" stop-color="#B4B4B4"/><stop offset="100%" stop-color="#969696"/>
    </linearGradient>
  
    <linearGradient id="midgray-double-face-color-front-lid" gradientUnits="userSpaceOnUse"
                    x1="27" y1="20" x2="57" y2="44">
      <stop offset="0%" stop-color="#D1D1D1"/>
      <stop offset="58%" stop-color="#B4B4B4"/>
      <stop offset="100%" stop-color="#969696"/>
    </linearGradient>
  
    <linearGradient id="midgray-double-darkened-front-left" gradientUnits="userSpaceOnUse"
                    x1="27" y1="29" x2="58" y2="73">
      <stop offset="0%" stop-color="#A8A8A8"/>
      <stop offset="58%" stop-color="#858585"/>
      <stop offset="100%" stop-color="#686868"/>
    </linearGradient>
  </defs>
  <g>
    <polygon points="6.00,16.75 22.00,28.75 22.00,44.25 6.00,32.25" fill="url(#midgray-double-closed-left)"/>
    <polygon points="22.00,28.75 38.00,16.75 38.00,32.25 22.00,44.25" fill="url(#midgray-double-closed-right)"/>
    <path d="M22.00 28.75V44.25" stroke="#4B4B4B" stroke-opacity="0.12" stroke-width="0.65"/>
    <path d="M6.00 16.75V32.25" stroke="#FEFEFE" stroke-opacity="0.24" stroke-width="0.7"/>
    <polygon points="22.00,4.75 38.00,16.75 22.00,28.75 6.00,16.75" fill="url(#midgray-double-closed-top)"/>
    <polygon points="22.00,5.70 36.74,16.75 22.00,27.80 7.26,16.75" fill="#FEFEFE" opacity="0.10"/>
    <path d="M22.00 4.75L6.00 16.75" stroke="#FEFEFE" stroke-opacity="0.30" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M22.00 4.75L38.00 16.75" stroke="#FEFEFE" stroke-opacity="0.16" stroke-width="0.65" stroke-linecap="round"/>
    <polygon points="26.00,31.75 42.00,43.75 42.00,59.25 26.00,47.25" fill="url(#midgray-double-darkened-front-left)"/>
    <polygon points="42.00,43.75 58.00,31.75 58.00,47.25 42.00,59.25" fill="url(#midgray-double-closed-right)"/>
    <path d="M42.00 43.75V59.25" stroke="#4B4B4B" stroke-opacity="0.12" stroke-width="0.65"/>
    <path d="M26.00 31.75V47.25" stroke="#FEFEFE" stroke-opacity="0.24" stroke-width="0.7"/>
    <polygon points="42.00,19.75 58.00,31.75 42.00,43.75 26.00,31.75" fill="url(#midgray-double-face-color-front-lid)"/>
    <polygon points="42.00,20.70 56.74,31.75 42.00,42.80 27.26,31.75" fill="#FEFEFE" opacity="0.14"/>
    
    

    <path d="M26.00 31.75L42.00 19.75L58.00 31.75"
          fill="none" stroke="#555555" stroke-opacity="0.58"
          stroke-width="0.82" stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
</svg>
