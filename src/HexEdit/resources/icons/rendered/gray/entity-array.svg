<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" shape-rendering="geometricPrecision" role="img" aria-labelledby="title desc">
  <title>Mid-gray Entity array icon</title>
  <desc id="desc">The original lighter mid-gray single-box variant used for the closed state.</desc>
  <defs>
    <linearGradient id="gray-single-closed-top" gradientUnits="userSpaceOnUse" x1="8" y1="4" x2="55" y2="40">
      <stop offset="0%" stop-color="#FEFEFE"/><stop offset="34%" stop-color="#EFEFEF"/><stop offset="72%" stop-color="#D9D9D9"/><stop offset="100%" stop-color="#C3C3C3"/>
    </linearGradient>
    <linearGradient id="gray-single-closed-left" gradientUnits="userSpaceOnUse" x1="7" y1="14" x2="38" y2="58">
      <stop offset="0%" stop-color="#D1D1D1"/><stop offset="58%" stop-color="#B4B4B4"/><stop offset="100%" stop-color="#969696"/>
    </linearGradient>
    <linearGradient id="gray-single-closed-right" gradientUnits="userSpaceOnUse" x1="28" y1="18" x2="58" y2="59">
      <stop offset="0%" stop-color="#989898"/><stop offset="54%" stop-color="#747474"/><stop offset="100%" stop-color="#5A5A5A"/>
    </linearGradient>
    <linearGradient id="gray-single-closed-rim-light" gradientUnits="userSpaceOnUse" x1="12" y1="7" x2="47" y2="34">
      <stop offset="0%" stop-color="#FEFEFE"/><stop offset="52%" stop-color="#EFEFEF"/><stop offset="100%" stop-color="#D9D9D9"/>
    </linearGradient>
    <linearGradient id="gray-single-closed-rim-left" gradientUnits="userSpaceOnUse" x1="14" y1="18" x2="35" y2="35">
      <stop offset="0%" stop-color="#D1D1D1"/><stop offset="100%" stop-color="#B4B4B4"/>
    </linearGradient>
    <linearGradient id="gray-single-closed-rim-right" gradientUnits="userSpaceOnUse" x1="31" y1="17" x2="50" y2="35">
      <stop offset="0%" stop-color="#989898"/><stop offset="100%" stop-color="#747474"/>
    </linearGradient>
  </defs>
  <g>
    <polygon points="14.00,21.00 32.00,34.50 32.00,52.00 14.00,38.50" fill="url(#gray-single-closed-left)"/>
    <polygon points="32.00,34.50 50.00,21.00 50.00,38.50 32.00,52.00" fill="url(#gray-single-closed-right)"/>
    <path d="M32.00 34.50V52.00" stroke="#4B4B4B" stroke-opacity="0.12" stroke-width="0.65"/>
    <path d="M14.00 21.00V38.50" stroke="#FEFEFE" stroke-opacity="0.24" stroke-width="0.7"/>
    <polygon points="32.00,7.50 50.00,21.00 32.00,34.50 14.00,21.00" fill="url(#gray-single-closed-top)"/>
    <polygon points="32.00,8.45 48.74,21.00 32.00,33.55 15.26,21.00" fill="#FEFEFE" opacity="0.10"/>
    <path d="M32.00 7.50L14.00 21.00" stroke="#FEFEFE" stroke-opacity="0.30" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M32.00 7.50L50.00 21.00" stroke="#FEFEFE" stroke-opacity="0.16" stroke-width="0.65" stroke-linecap="round"/>
  </g>


  <g id="array-brackets" fill="none" stroke="#555555" stroke-width="3.35"
