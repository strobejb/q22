      <stop offset="0%" stop-color="#B53A79"/><stop offset="100%" stop-color="#8E175A"/>
    </linearGradient>
  </defs>
  <g>
    <polygon points="14.00,21.00 32.00,34.50 32.00,52.00 14.00,38.50" fill="url(#pink-single-closed-left)"/>
    <polygon points="32.00,34.50 50.00,21.00 50.00,38.50 32.00,52.00" fill="url(#pink-single-closed-right)"/>
    <path d="M32.00 34.50V52.00" stroke="#51002F" stroke-opacity="0.12" stroke-width="0.65"/>
    <path d="M14.00 21.00V38.50" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="0.7"/>
    <polygon points="32.00,7.50 50.00,21.00 32.00,34.50 14.00,21.00" fill="url(#pink-single-closed-top)"/>
    <polygon points="32.00,8.45 48.74,21.00 32.00,33.55 15.26,21.00" fill="#FFFFFF" opacity="0.10"/>
    <path d="M32.00 7.50L14.00 21.00" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M32.00 7.50L50.00 21.00" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="0.65" stroke-linecap="round"/>
