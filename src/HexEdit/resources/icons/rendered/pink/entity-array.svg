<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" shape-rendering="geometricPrecision" role="img" aria-labelledby="title desc">
  <title>Pink Entity array icon</title>
  <desc id="desc">The original lighter pink single-box variant used for the closed state.</desc>
  <defs>
    <linearGradient id="pink-single-closed-top" gradientUnits="userSpaceOnUse" x1="8" y1="4" x2="55" y2="40">
      <stop offset="0%" stop-color="#FFF8FC"/><stop offset="34%" stop-color="#FFD9EE"/><stop offset="72%" stop-color="#F7A8D2"/><stop offset="100%" stop-color="#E57FB5"/>
    </linearGradient>
    <linearGradient id="pink-single-closed-left" gradientUnits="userSpaceOnUse" x1="7" y1="14" x2="38" y2="58">
      <stop offset="0%" stop-color="#F2A1CA"/><stop offset="58%" stop-color="#DC6FA9"/><stop offset="100%" stop-color="#B84582"/>
    </linearGradient>
    <linearGradient id="pink-single-closed-right" gradientUnits="userSpaceOnUse" x1="28" y1="18" x2="58" y2="59">
      <stop offset="0%" stop-color="#B53A79"/><stop offset="54%" stop-color="#8E175A"/><stop offset="100%" stop-color="#65063D"/>
    </linearGradient>
    <linearGradient id="pink-single-closed-rim-light" gradientUnits="userSpaceOnUse" x1="12" y1="7" x2="47" y2="34">
      <stop offset="0%" stop-color="#FFF8FC"/><stop offset="52%" stop-color="#FFD9EE"/><stop offset="100%" stop-color="#F7A8D2"/>
    </linearGradient>
