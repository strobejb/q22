name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release, for example 3.0.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        shell: python
        run: |
          import os
          import re
          import subprocess

          version = "${{ inputs.version }}"
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit("Version must use MAJOR.MINOR.PATCH format, for example 3.0.2")

          tag = f"v{version}"
          existing = subprocess.run(
              ["git", "rev-parse", "-q", "--verify", f"refs/tags/{tag}"],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
          )
          if existing.returncode == 0:
              raise SystemExit(f"Tag {tag} already exists")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              print(f"HEXEDIT_RELEASE_VERSION={version}", file=env)
              print(f"HEXEDIT_RELEASE_TAG={tag}", file=env)

      - name: Stamp version.h
        run: >
          python scripts/stamp_version.py
          --version "${HEXEDIT_RELEASE_VERSION}"
          --build-count 0

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/HexEdit/version.h
          if git diff --cached --quiet; then
            echo "version.h already contains ${HEXEDIT_RELEASE_VERSION}"
          else
            git commit -m "Bump version to ${HEXEDIT_RELEASE_VERSION}"
          fi
          git tag -a "${HEXEDIT_RELEASE_TAG}" -m "HexEdit ${HEXEDIT_RELEASE_VERSION}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "${HEXEDIT_RELEASE_TAG}"
