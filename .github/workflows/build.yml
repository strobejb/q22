name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package (linuxdeploy)
        run: |
          sudo apt-get install -y imagemagick
          convert src/HexEdit/resources/hexedit.png -resize 512x512! src/HexEdit/resources/hexedit.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp build/hexedit AppDir/usr/bin/
          QMAKE="$QT_ROOT_DIR/bin/qmake" \
          OUTPUT=hexedit-x86_64.AppImage \
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file src/HexEdit/resources/hexedit.desktop \
            --icon-file src/HexEdit/resources/hexedit.png
          mv hexedit-x86_64.AppImage hexedit-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hexedit-linux
          path: hexedit-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert PNG to ICO
        shell: pwsh
        run: |
          magick src/HexEdit/resources/hexedit.png -define icon:auto-resize=256,128,64,48,32,16 src/HexEdit/resources/hexedit.ico

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure (MSVC)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt DLLs (windeployqt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build\Release\hexedit.exe dist\
          windeployqt --release --no-translations dist\hexedit.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hexedit-windows
          path: dist\
