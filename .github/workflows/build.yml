name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Package (linuxdeploy)
        run: |
          convert qexed.png -resize 512x512! qexed-512.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp build/qexed AppDir/usr/bin/
          QMAKE="$(which qmake)" \
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file qexed.desktop \
            --icon-file qexed-512.png
          mv qexed-*.AppImage qexed-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qexed-linux
          path: qexed-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert PNG to ICO
        shell: pwsh
        run: |
          magick qexed.png -define icon:auto-resize=256,128,64,48,32,16 qexed.ico

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: windows
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1120'
          cache: true

      - name: Configure (MinGW)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy Qt DLLs (windeployqt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build\qexed.exe dist\
          windeployqt --release --no-translations dist\qexed.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qexed-windows
          path: dist\
