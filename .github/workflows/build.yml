name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        shell: python
        run: |
          import os
          import subprocess
          import sys

          subprocess.check_call([
              sys.executable, "scripts/stamp_version.py",
              "--build-count", os.environ["GITHUB_RUN_NUMBER"],
              "--ref-name", os.environ["GITHUB_REF_NAME"],
          ])

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Set up swap
        run: |
          sudo dd if=/dev/zero of=/swap2 bs=1M count=4096
          sudo chmod 600 /swap2
          sudo mkswap /swap2
          sudo swapon /swap2

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package (linuxdeploy)
        run: |
          sudo apt-get install -y imagemagick
          convert src/HexEdit/resources/q22.png -resize 512x512! src/HexEdit/resources/q22.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/metainfo
          cp build/q22 AppDir/usr/bin/
          cp src/HexEdit/resources/q22.metainfo.xml AppDir/usr/share/metainfo/
          appimage="q22-${HEXEDIT_FILE_VERSION}-linux-x86_64.AppImage"
          QMAKE="$QT_ROOT_DIR/bin/qmake" \
          LDAI_OUTPUT="${appimage}" \
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file src/HexEdit/resources/q22.desktop \
            --icon-file src/HexEdit/resources/q22.png
          test -f "${appimage}"
          echo "Created AppImage: ${appimage}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: q22-linux
          path: q22-*-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        shell: python
        run: |
          import os
          import subprocess
          import sys

          subprocess.check_call([
              sys.executable, "scripts/stamp_version.py",
              "--build-count", os.environ["GITHUB_RUN_NUMBER"],
              "--ref-name", os.environ["GITHUB_REF_NAME"],
          ])

      - name: Convert PNG to ICO
        shell: pwsh
        run: |
          magick src/HexEdit/resources/q22.png -define icon:auto-resize=256,128,64,48,32,16 src/HexEdit/resources/q22.ico

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure (MSVC)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Deploy Qt DLLs (windeployqt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build\Release\q22.exe dist\
          windeployqt --release --no-translations dist\q22.exe
          Copy-Item LICENSE, NOTICES, CHANGELOG.md, README.md dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: q22-windows
          path: dist\
