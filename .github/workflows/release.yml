name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release, for example 3.0.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-info.outputs.version }}
      tag: ${{ steps.release-info.outputs.tag }}
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases must be run from main. Current ref: ${GITHUB_REF}"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        id: release-info
        shell: python
        run: |
          import os
          import re
          import subprocess

          version = "${{ inputs.version }}"
          semver_core = r"(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)"
          if not re.fullmatch(semver_core, version, flags=re.ASCII):
              raise SystemExit(
                  "Version must use MAJOR.MINOR.PATCH with ASCII digits and no leading zeroes, for example 3.0.2"
              )

          tag = f"v{version}"
          if not re.fullmatch(r"v" + semver_core, tag, flags=re.ASCII):
              raise SystemExit(f"Invalid release tag: {tag}")

          existing = subprocess.run(
              ["git", "rev-parse", "-q", "--verify", f"refs/tags/{tag}"],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
          )
          if existing.returncode == 0:
              raise SystemExit(f"Tag {tag} already exists")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={version}", file=output)
              print(f"tag={tag}", file=output)

      - name: Stamp version.h
        run: >
          python scripts/stamp_version.py
          --version "${{ steps.release-info.outputs.version }}"
          --build-count 0

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/HexEdit/version.h
          if git diff --cached --quiet; then
            echo "version.h already contains ${{ steps.release-info.outputs.version }}"
          else
            git commit -m "Bump version to ${{ steps.release-info.outputs.version }}"
          fi
          git tag -a "${{ steps.release-info.outputs.tag }}" -m "HexEdit ${{ steps.release-info.outputs.version }}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "${{ steps.release-info.outputs.tag }}"

  build-linux:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Stamp build version
        shell: python
        run: |
          import os
          import subprocess
          import sys

          subprocess.check_call([
              sys.executable, "scripts/stamp_version.py",
              "--build-count", os.environ["GITHUB_RUN_NUMBER"],
              "--ref-name", "${{ needs.prepare-release.outputs.tag }}",
          ])

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Set up swap
        run: |
          sudo dd if=/dev/zero of=/swap2 bs=1M count=4096
          sudo chmod 600 /swap2
          sudo mkswap /swap2
          sudo swapon /swap2

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package AppImage
        run: |
          sudo apt-get install -y imagemagick
          convert src/HexEdit/resources/hexedit.png -resize 512x512! src/HexEdit/resources/hexedit.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp build/hexedit AppDir/usr/bin/
          appimage="hexedit-${HEXEDIT_FILE_VERSION}-linux-x86_64.AppImage"
          QMAKE="$QT_ROOT_DIR/bin/qmake" \
          LDAI_OUTPUT="${appimage}" \
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file src/HexEdit/resources/hexedit.desktop \
            --icon-file src/HexEdit/resources/hexedit.png
          test -f "${appimage}"
          echo "Created AppImage: ${appimage}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: hexedit-linux
          path: hexedit-*-linux-x86_64.AppImage

  build-windows:
    needs: prepare-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Stamp build version
        shell: python
        run: |
          import os
          import subprocess
          import sys

          subprocess.check_call([
              sys.executable, "scripts/stamp_version.py",
              "--build-count", os.environ["GITHUB_RUN_NUMBER"],
              "--ref-name", "${{ needs.prepare-release.outputs.tag }}",
          ])

      - name: Convert PNG to ICO
        shell: pwsh
        run: |
          magick src/HexEdit/resources/hexedit.png -define icon:auto-resize=256,128,64,48,32,16 src/HexEdit/resources/hexedit.ico

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure (MSVC)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build\Release\hexedit.exe dist\
          windeployqt --release --no-translations dist\hexedit.exe
          Compress-Archive -Path dist\* -DestinationPath "hexedit-${env:HEXEDIT_FILE_VERSION}-windows-x86_64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hexedit-windows
          path: hexedit-*-windows-x86_64.zip

  publish-release:
    needs:
      - prepare-release
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        run: |
          gh release create "${{ needs.prepare-release.outputs.tag }}" \
            --verify-tag \
            --title "HexEdit ${{ needs.prepare-release.outputs.version }}" \
            --notes "HexEdit ${{ needs.prepare-release.outputs.version }}" \
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
